<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Controle Pro Motorista</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>

:root {
–green: #00c853;
–green-glow: rgba(0, 200, 83, 0.25);
–green-dim: rgba(0, 200, 83, 0.08);
–green-border: rgba(0, 200, 83, 0.18);
–bg: #060a06;
–s1: #0c110c;
–s2: #111711;
–s3: #0a0f0a;
–text: #ddeadd;
–text-dim: #8aa08a;
–muted: #3d533d;
–error: #ff4d4d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
position: relative;
}

/* Animated background */
.bg-layer {
position: fixed;
inset: 0;
z-index: 0;
overflow: hidden;
}

.bg-orb {
position: absolute;
border-radius: 50%;
filter: blur(80px);
opacity: 0.12;
animation: drift 18s ease-in-out infinite alternate;
}

.bg-orb-1 {
width: 500px; height: 500px;
background: radial-gradient(circle, #00c853, transparent 70%);
top: -120px; left: -80px;
animation-duration: 20s;
}

.bg-orb-2 {
width: 350px; height: 350px;
background: radial-gradient(circle, #007a32, transparent 70%);
bottom: -80px; right: -60px;
animation-duration: 14s;
animation-direction: alternate-reverse;
}

.bg-orb-3 {
width: 200px; height: 200px;
background: radial-gradient(circle, #00c853, transparent 70%);
top: 50%; left: 60%;
opacity: 0.06;
animation-duration: 25s;
}

@keyframes drift {
from { transform: translate(0, 0) scale(1); }
to { transform: translate(30px, 20px) scale(1.08); }
}

/* Grid pattern */
.bg-grid {
position: fixed;
inset: 0;
z-index: 0;
background-image:
linear-gradient(rgba(0,200,83,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,200,83,0.03) 1px, transparent 1px);
background-size: 40px 40px;
}

/* Main container */
.login-page {
position: relative;
z-index: 1;
width: 100%;
max-width: 440px;
padding: 24px;
animation: pageIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes pageIn {
from { opacity: 0; transform: translateY(24px); }
to { opacity: 1; transform: translateY(0); }
}

/* Card */
.login-box {
background: linear-gradient(145deg, var(–s1) 0%, var(–s3) 100%);
border: 1px solid var(–green-border);
border-radius: 28px;
padding: 40px 36px;
display: flex;
flex-direction: column;
gap: 0;
position: relative;
overflow: hidden;
box-shadow:
0 0 0 1px rgba(0,200,83,0.04),
0 24px 60px rgba(0,0,0,0.6),
inset 0 1px 0 rgba(255,255,255,0.04);
}

/* Top shimmer line */
.login-box::before {
content: ‘’;
position: absolute;
top: 0; left: 20%; right: 20%;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0,200,83,0.5), transparent);
}

/* Logo area */
.login-header {
text-align: center;
margin-bottom: 32px;
}

.logo-icon {
display: inline-flex;
align-items: center;
justify-content: center;
width: 60px;
height: 60px;
background: var(–green-dim);
border: 1px solid var(–green-border);
border-radius: 18px;
font-size: 28px;
margin-bottom: 18px;
position: relative;
box-shadow: 0 0 20px rgba(0,200,83,0.12);
animation: pulse-icon 3s ease-in-out infinite;
}

@keyframes pulse-icon {
0%, 100% { box-shadow: 0 0 20px rgba(0,200,83,0.12); }
50% { box-shadow: 0 0 32px rgba(0,200,83,0.28); }
}

.login-logo {
font-family: ‘Syne’, sans-serif;
font-size: 26px;
font-weight: 900;
letter-spacing: -0.5px;
color: var(–text);
line-height: 1;
margin-bottom: 6px;
}

.login-logo span {
color: var(–green);
}

.login-sub {
font-size: 13px;
color: var(–text-dim);
font-weight: 300;
letter-spacing: 0.2px;
}

/* Fields */
.fields-group {
display: flex;
flex-direction: column;
gap: 14px;
margin-bottom: 22px;
}

.field {
display: flex;
flex-direction: column;
gap: 7px;
position: relative;
}

.field label {
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1px;
color: var(–muted);
font-weight: 500;
padding-left: 2px;
transition: color 0.2s;
}

.field:focus-within label {
color: var(–green);
}

.input-wrap {
position: relative;
}

.input-wrap .icon {
position: absolute;
left: 14px;
top: 50%;
transform: translateY(-50%);
color: var(–muted);
font-size: 15px;
pointer-events: none;
transition: color 0.2s;
}

.field:focus-within .icon {
color: var(–green);
}

.field input {
width: 100%;
padding: 13px 14px 13px 40px;
border-radius: 13px;
border: 1px solid rgba(0,200,83,0.12);
background: var(–s2);
color: var(–text);
font-size: 14px;
font-family: ‘DM Sans’, sans-serif;
font-weight: 400;
outline: none;
transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

.field input::placeholder {
color: var(–muted);
font-weight: 300;
}

.field input:focus {
border-color: rgba(0,200,83,0.5);
background: #121a12;
box-shadow: 0 0 0 3px rgba(0,200,83,0.07), inset 0 1px 0 rgba(0,200,83,0.04);
}

.field input.error {
border-color: rgba(255,77,77,0.5);
box-shadow: 0 0 0 3px rgba(255,77,77,0.07);
}

.field-error {
font-size: 11px;
color: var(–error);
padding-left: 2px;
display: none;
animation: fadeIn 0.2s ease;
}

.field-error.visible { display: block; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(-4px); }
to { opacity: 1; transform: translateY(0); }
}

/* Password toggle */
.toggle-pass {
position: absolute;
right: 13px;
top: 50%;
transform: translateY(-50%);
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 14px;
padding: 2px 4px;
transition: color 0.2s;
line-height: 1;
}

.toggle-pass:hover { color: var(–text-dim); }

/* Forgot password */
.forgot {
text-align: right;
margin-top: -6px;
}

.forgot a {
font-size: 11px;
color: var(–text-dim);
text-decoration: none;
letter-spacing: 0.2px;
transition: color 0.2s;
}

.forgot a:hover { color: var(–green); }

/* Button */
.login-btn {
width: 100%;
padding: 15px;
border: none;
border-radius: 14px;
background: var(–green);
color: #000;
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 14px;
letter-spacing: 0.3px;
cursor: pointer;
transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
position: relative;
overflow: hidden;
margin-bottom: 20px;
}

.login-btn::after {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(180deg, rgba(255,255,255,0.14) 0%, transparent 60%);
pointer-events: none;
}

.login-btn:hover {
background: #00e060;
transform: translateY(-1px);
box-shadow: 0 8px 24px rgba(0,200,83,0.35);
}

.login-btn:active {
transform: translateY(0);
box-shadow: none;
}

.login-btn.loading {
pointer-events: none;
opacity: 0.8;
}

.btn-content {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.spinner {
width: 16px; height: 16px;
border: 2px solid rgba(0,0,0,0.2);
border-top-color: #000;
border-radius: 50%;
animation: spin 0.7s linear infinite;
display: none;
}

.loading .spinner { display: block; }
.loading .btn-text { opacity: 0.7; }

@keyframes spin {
to { transform: rotate(360deg); }
}

/* Divider */
.divider {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 20px;
}

.divider::before, .divider::after {
content: ‘’;
flex: 1;
height: 1px;
background: rgba(0,200,83,0.1);
}

.divider span {
font-size: 11px;
color: var(–muted);
white-space: nowrap;
letter-spacing: 0.5px;
}

/* Google button */
.google-btn {
width: 100%;
padding: 13px;
border-radius: 13px;
border: 1px solid rgba(0,200,83,0.12);
background: var(–s2);
color: var(–text-dim);
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
font-weight: 500;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
transition: border-color 0.2s, background 0.2s, color 0.2s;
margin-bottom: 24px;
}

.google-btn:hover {
border-color: rgba(0,200,83,0.3);
background: #121a12;
color: var(–text);
}

.google-logo {
font-size: 16px;
line-height: 1;
}

/* Footer link */
.login-create {
text-align: center;
font-size: 12.5px;
color: var(–muted);
padding-top: 2px;
}

.login-create a {
color: var(–green);
text-decoration: none;
font-weight: 600;
margin-left: 4px;
transition: opacity 0.2s;
}

.login-create a:hover { opacity: 0.8; }

/* Toast notification */
.toast {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–s1);
border: 1px solid var(–green-border);
border-radius: 12px;
padding: 12px 20px;
font-size: 13px;
color: var(–text);
box-shadow: 0 8px 32px rgba(0,0,0,0.4);
opacity: 0;
pointer-events: none;
transition: opacity 0.3s, transform 0.3s;
z-index: 99;
white-space: nowrap;
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

.toast.success { border-color: rgba(0,200,83,0.4); }
.toast.fail { border-color: rgba(255,77,77,0.4); }

/* Shake animation */
@keyframes shake {
0%, 100% { transform: translateX(0); }
20% { transform: translateX(-6px); }
40% { transform: translateX(6px); }
60% { transform: translateX(-4px); }
80% { transform: translateX(4px); }
}

.shake { animation: shake 0.4s ease; }

</style>
</head>

<div class="bg-grid"></div>

<script>
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function setError(id, msg) {
    const input = document.getElementById(id);
    const err = document.getElementById(id + '-error');
    if (msg) {
      input.classList.add('error');
      err.textContent = msg;
      err.classList.add('visible');
    } else {
      input.classList.remove('error');
      err.classList.remove('visible');
    }
  }

  function clearErrors() {
    setError('email', '');
    setError('senha', '');
  }

  // Clear error on input
  document.getElementById('email').addEventListener('input', () => setError('email', ''));
  document.getElementById('senha').addEventListener('input', () => setError('senha', ''));

  // Enter key
  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function togglePass() {
    const input = document.getElementById('senha');
    const btn = document.getElementById('toggle-btn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  function login() {
    clearErrors();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('login-btn');

    let valid = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setError('email', 'Digite um email válido');
      valid = false;
    }

    if (!senha) {
      setError('senha', 'A senha é obrigatória');
      valid = false;
    }

    if (!valid) {
      btn.classList.add('shake');
      setTimeout(() => btn.classList.remove('shake'), 400);
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Entrando...';

    // Simula requisição (substituir com Firebase)
    setTimeout(() => {
      btn.classList.remove('loading');
      btn.querySelector('.btn-text').textContent = 'Entrar';
      showToast('✅ Login realizado com sucesso!', 'success');
      // auth.signInWithEmailAndPassword(email, senha)
    }, 1800);
  }

  function loginGoogle() {
    showToast('🔜 Login com Google em breve', 'success');
    // provider = new GoogleAuthProvider(); signInWithPopup(auth, provider)
  }
</script>
