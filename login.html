<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Controle Pro Motorista</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
--green: #00c853;
--green-glow: rgba(0,200,83,0.25);
--green-dim: rgba(0,200,83,0.08);
--green-border: rgba(0,200,83,0.18);
--bg: #060a06;
--s1: #0c110c;
--s2: #111711;
--s3: #0a0f0a;
--text: #ddeadd;
--text-dim: #8aa08a;
--muted: #3d533d;
--error: #ff4d4d;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CARD */

.login-page{
width:100%;
max-width:420px;
padding:20px;
}

.login-box{
background:linear-gradient(145deg,var(--s1),var(--s3));
border:1px solid var(--green-border);
border-radius:28px;
padding:40px 30px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

/* HEADER */

.login-header{
text-align:center;
margin-bottom:30px;
}

.logo-icon{
font-size:40px;
margin-bottom:10px;
}

.login-logo{
font-family:'Syne',sans-serif;
font-size:26px;
font-weight:900;
}

.login-logo span{
color:var(--green);
}

.login-sub{
font-size:13px;
color:var(--text-dim);
margin-top:6px;
}

/* FIELDS */

.fields-group{
display:flex;
flex-direction:column;
gap:14px;
margin-bottom:18px;
}

.field{
display:flex;
flex-direction:column;
gap:5px;
}

.field label{
font-size:11px;
color:var(--muted);
text-transform:uppercase;
}

.input-wrap{
position:relative;
}

.field input{
width:100%;
padding:12px 14px;
border-radius:12px;
border:1px solid var(--green-border);
background:var(--s2);
color:var(--text);
font-size:14px;
outline:none;
}

.field input:focus{
border-color:var(--green);
}

/* BUTTON */

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:var(--green);
color:#000;
font-family:'Syne',sans-serif;
font-weight:800;
font-size:14px;
cursor:pointer;
margin-top:8px;
transition:.2s;
}

.login-btn:hover{
background:#00e060;
transform:translateY(-1px);
}

/* FOOTER */

.login-create{
text-align:center;
margin-top:16px;
font-size:13px;
color:var(--muted);
}

.login-create a{
color:var(--green);
text-decoration:none;
font-weight:600;
margin-left:4px;
}

.toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:var(--s1);
border:1px solid var(--green-border);
padding:10px 18px;
border-radius:10px;
opacity:0;
transition:.3s;
}

.toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="login-page">

<div class="login-box">

<div class="login-header">
<div class="logo-icon">🚗</div>
<div class="login-logo">Controle <span>Pro</span></div>
<div class="login-sub">Entre na sua conta de motorista</div>
</div>

<div class="fields-group">

<div class="field">
<label>Email</label>
<input type="email" id="email" placeholder="seu@email.com">
</div>

<div class="field">
<label>Senha</label>
<input type="password" id="senha" placeholder="Sua senha">
</div>

</div>

<button class="login-btn" onclick="login()">Entrar</button>

<div class="login-create">
Não tem conta?<a href="#">Criar conta</a>
</div>

</div>

</div>

<div class="toast" id="toast"></div>

<script>

function showToast(msg){
const t=document.getElementById("toast")
t.textContent=msg
t.classList.add("show")

setTimeout(()=>{
t.classList.remove("show")
},3000)
}

function login(){

const email=document.getElementById("email").value.trim()
const senha=document.getElementById("senha").value

if(!email || !senha){
showToast("Preencha email e senha")
return
}

showToast("Login realizado com sucesso")

setTimeout(()=>{
window.location.href="index.html"
},1200)

}

</script>

</body>
</html>
