  <script>
    // ---- Config Firebase inline ----
    const firebaseConfig = {
      apiKey:            "AIzaSyBHfI8CE9eMUQ99JM_XAjEkiuFMDoz3M8I",
      authDomain:        "controle-pro-motorista.firebaseapp.com",
      projectId:         "controle-pro-motorista",
      storageBucket:     "controle-pro-motorista.firebasestorage.app",
      messagingSenderId: "991201688036",
      appId:             "1:991201688036:web:fac529d7c0e7cad826eff1"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Redireciona se já estiver logado
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });

    function mostrarMsg(texto, ok) {
      const el = document.getElementById('msg');
      el.textContent = texto;
      el.className = 'auth-msg' + (ok ? ' ok' : '');
      el.classList.remove('hidden');
    }

    function traduzirErro(code) {
      const e = {
        'auth/email-already-in-use':   'Este e-mail já está cadastrado.',
        'auth/invalid-email':          'E-mail inválido.',
        'auth/weak-password':          'Senha muito fraca.',
        'auth/network-request-failed': 'Sem conexão. Verifique sua internet.',
      };
      return e[code] || 'Erro: ' + code;
    }

    document.getElementById('btn-cadastrar').addEventListener('click', function() {
      const nome  = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const senha2= document.getElementById('senha2').value;

      if (!nome || !email || !senha) return mostrarMsg('Preencha todos os campos.');
      if (senha.length < 6) return mostrarMsg('Senha precisa ter ao menos 6 caracteres.');
      if (senha !== senha2) return mostrarMsg('As senhas não coincidem.');

      this.textContent = 'Criando conta...';

      auth.createUserWithEmailAndPassword(email, senha)
        .then(cred => cred.user.updateProfile({ displayName: nome }))
        .then(() => {
          mostrarMsg('Conta criada! Redirecionando...', true);
          setTimeout(() => window.location.href = 'index.html', 1500);
        })
        .catch(err => {
          mostrarMsg(traduzirErro(err.code));
          document.getElementById('btn-cadastrar').textContent = 'Criar conta grátis';
        });
    });
  </script>
