<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Conta</title>

<style>

body{
font-family: Arial;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
color:white;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:6px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
font-size:16px;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

.login{
text-align:center;
margin-top:15px;
color:#cbd5f5;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>
<body>

<div class="container">

<h2>Criar Conta</h2>

<input type="text" id="nome" placeholder="Seu nome">

<input type="email" id="email" placeholder="Email">

<input type="password" id="senha" placeholder="Senha">

<button id="btnCadastrar" type="button">Cadastrar</button>

<div class="login">
Já tem conta? <a href="login.html">Entrar</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "controle-pro-motorista.firebaseapp.com",
projectId: "controle-pro-motorista",
storageBucket: "controle-pro-motorista.appspot.com",
messagingSenderId: "991201688036",
appId: "1:991201688036:web:fac529d7c0e7cad826eff1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


async function cadastrar(){

const nome = document.getElementById("nome").value.trim();
const email = document.getElementById("email").value.trim();
const senha = document.getElementById("senha").value.trim();

if(!nome || !email || !senha){
alert("Preencha todos os campos");
return;
}

if(senha.length < 6){
alert("A senha precisa ter pelo menos 6 caracteres");
return;
}

try{

const userCredential = await createUserWithEmailAndPassword(auth,email,senha);
const user = userCredential.user;

await setDoc(doc(db,"usuarios",user.uid),{
nome:nome,
email:email
});

alert("Conta criada com sucesso!");

window.location.href = "app.html";

}catch(error){

alert("Erro: " + error.message);

}

}

document.getElementById("btnCadastrar").addEventListener("click", cadastrar);

</script>

</body>
</html>
