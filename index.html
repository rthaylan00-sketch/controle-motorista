<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0d1117"/>
  <title>DriveControl Pro — Login</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-orb orb1"></div>
    <div class="auth-orb orb2"></div>
    <div class="auth-orb orb3"></div>
  </div>

  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">🚗</div>
      <h1>DriveControl<br/><span>Pro</span></h1>
      <p>Painel do motorista profissional</p>
    </div>

    <div class="auth-card">
      <h2 class="auth-card-title">Entrar na conta</h2>

      <div class="field-group">
        <label class="field-label">E-mail</label>
        <input class="field-input" type="email" id="email" placeholder="seu@email.com"/>
      </div>
      <div class="field-group">
        <label class="field-label">Senha</label>
        <input class="field-input" type="password" id="senha" placeholder="••••••••"/>
      </div>

      <button class="btn-primary full" onclick="fazerLogin()">Entrar</button>
      <div class="divider"><span>ou</span></div>
      <button class="btn-google full" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.3 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.8 6.5 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.5-8 19.5-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.8 6.5 29.2 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.7-3.6-11.3-8.5l-6.6 5.1C9.7 39.5 16.3 44 24 44z"/><path fill="#1565C0" d="M43.6 20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.4l6.2 5.2C41.2 35.1 44 29.9 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Entrar com Google
      </button>

      <p class="auth-link">Não tem conta? <a href="cadastro.html">Cadastre-se grátis</a></p>
      <div id="msg-login" class="auth-msg hidden"></div>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_PROJETO.firebaseapp.com",
projectId: "SEU_PROJETO",
appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged(user => {

if(!user){
window.location.href = "login.html";
}

});

</script>
</body>
</html>
