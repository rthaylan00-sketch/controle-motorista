<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DriveControl Pro — Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="style.css"/>
</head>

<body class="auth-page">

<div class="auth-container">

<h2>Entrar na conta</h2>

<div class="field-group">
<label>E-mail</label>
<input type="email" id="email" placeholder="seu@email.com">
</div>

<div class="field-group">
<label>Senha</label>
<input type="password" id="senha" placeholder="••••••••">
</div>

<button class="btn-primary" onclick="fazerLogin()">Entrar</button>

<br><br>

<button onclick="loginGoogle()">Entrar com Google</button>

<p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>

<div id="msg-login"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBHfI8CE9eMUQ99JM_XAjEkiuFMDoz3M8I",
authDomain: "controle-pro-motorista.firebaseapp.com",
projectId: "controle-pro-motorista",
storageBucket: "controle-pro-motorista.firebasestorage.app",
messagingSenderId: "991201688036",
appId: "1:991201688036:web:fac529d7c0e7cad826eff1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

auth.onAuthStateChanged(user => {

if(user){
window.location.href = "index.html";
}

});

function fazerLogin(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

auth.signInWithEmailAndPassword(email, senha)

.then(()=>{
window.location.href = "index.html";
})

.catch((error)=>{

document.getElementById("msg-login").innerText = error.message;

});

}

function loginGoogle(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)

.then(()=>{
window.location.href = "index.html";
})

.catch((error)=>{

document.getElementById("msg-login").innerText = error.message;

});

}

</script>

</body>
</html>
