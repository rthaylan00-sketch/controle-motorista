<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle Pro Motorista</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--green:#00c853;
--green-dim:rgba(0,200,83,0.1);
--green-border:rgba(0,200,83,0.18);
--bg:#070b07;
--s1:#0e130e;
--s2:#131a13;
--s3:#192019;
--text:#e8f0e8;
--muted:#4e644e;
--muted2:#3a4e3a;
--red:#ff4757;
--red-dim:rgba(255,71,87,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
max-width:460px;
margin:0 auto;
padding:18px 15px 0;
}

.logo{
font-size:20px;
font-weight:700;
font-family:'Syne',sans-serif;
}

.saudacao{
font-size:14px;
color:var(--muted);
}

.btn-sair{
background:transparent;
border:1px solid var(--s3);
color:var(--text);
padding:6px 12px;
border-radius:10px;
cursor:pointer;
font-size:13px;
}

.page{
max-width:460px;
margin:0 auto;
padding:18px 15px 60px;
display:flex;
flex-direction:column;
gap:14px;
}

.hero{
background:linear-gradient(145deg,#00290f,#004d1a 48%,#007a28);
border-radius:22px;
padding:22px 20px;
}

.hero-value{
font-family:'Syne',sans-serif;
font-size:34px;
font-weight:800;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:var(--s1);
border:1px solid var(--green-border);
border-radius:16px;
padding:15px;
}

.stat-lbl{
font-size:10px;
text-transform:uppercase;
color:var(--muted);
}

.stat-val{
font-family:'Syne',sans-serif;
font-size:18px;
font-weight:700;
}

.card{
background:var(--s1);
border:1px solid var(--green-border);
border-radius:20px;
padding:20px;
}

.field{
margin-bottom:12px;
}

.field label{
font-size:11px;
color:var(--muted);
display:block;
margin-bottom:5px;
}

.field input,.field select{
width:100%;
padding:12px;
background:var(--s2);
border:1px solid var(--green-border);
border-radius:10px;
color:var(--text);
}

.btn-save{
width:100%;
padding:14px;
background:var(--green);
border:none;
border-radius:13px;
font-weight:700;
cursor:pointer;
color:#000;
}

.hist-card{
background:var(--s1);
border:1px solid var(--green-border);
border-radius:20px;
overflow:hidden;
}

.hist-list{
max-height:450px;
overflow:auto;
}

.hist-item{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
justify-content:space-between;
}

.toast{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%) translateY(80px);
padding:12px 22px;
border-radius:12px;
font-size:13px;
font-weight:700;
transition:0.3s;
}

.toast.show{
transform:translateX(-50%) translateY(0);
}

.toast.ok{
background:var(--green);
color:#000;
}

.toast.err{
background:var(--red);
color:#fff;
}

</style>

</head>

<body>

<div class="topbar">

<div>
<div class="logo">Controle Pro</div>
<div class="saudacao" id="boasVindas"></div>
</div>

<button id="btnSair" class="btn-sair">Sair</button>

</div>

<div class="page">

<div class="hero">
<div>Lucro líquido do mês</div>
<div class="hero-value" id="heroNet">R$ 0,00</div>
<div id="heroSub">Calculando...</div>
</div>

<div class="stats-grid">

<div class="stat">
<div class="stat-lbl">Ganhos hoje</div>
<div class="stat-val" id="stTodayInc">R$ 0</div>
</div>

<div class="stat">
<div class="stat-lbl">Gastos hoje</div>
<div class="stat-val" id="stTodayExp">R$ 0</div>
</div>

<div class="stat">
<div class="stat-lbl">Ganhos mês</div>
<div class="stat-val" id="stMonthInc">R$ 0</div>
</div>

<div class="stat">
<div class="stat-lbl">KM mês</div>
<div class="stat-val" id="stMonthKm">0 km</div>
</div>

</div>

<div class="card">

<div class="field">
<label>Ganhos</label>
<input type="number" id="ganho">
</div>

<div class="field">
<label>KM</label>
<input type="number" id="km">
</div>

<div class="field">
<label>Data</label>
<input type="date" id="data">
</div>

<button id="btnSave" class="btn-save">Salvar Dia</button>

</div>

<div class="hist-card">
<div class="hist-list" id="histList"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
import {getFirestore,doc,getDoc,collection,addDoc,getDocs,query,orderBy,Timestamp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyBHfI8",
authDomain:"controle-pro-motorista.firebaseapp.com",
projectId:"controle-pro-motorista",
storageBucket:"controle-pro-motorista.appspot.com",
messagingSenderId:"991201688036",
appId:"1:991201688036:web:fac529d7c0e7cad826eff1"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)

let uid=null

function hoje(){
return new Date().toISOString().split('T')[0]
}

function fmt(v){
return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2})
}

function toast(msg,type='ok'){
const t=document.getElementById('toast')
t.textContent=msg
t.className='toast '+type+' show'
setTimeout(()=>t.classList.remove('show'),2500)
}

onAuthStateChanged(auth,async(user)=>{

if(!user){
window.location.replace('./index.html')
return
}

uid=user.uid

const snap=await getDoc(doc(db,'usuarios',uid))
const nome=snap.data()?.nome||user.email

document.getElementById('boasVindas').textContent='👋 Olá, '+nome.split(' ')[0]

document.getElementById('data').value=hoje()

})

const btnSair=document.getElementById('btnSair')

btnSair.addEventListener('click',async()=>{

btnSair.disabled=true

try{

await signOut(auth)

window.location.replace('./index.html')

}catch(e){

toast('Erro ao sair','err')

btnSair.disabled=false

}

})

</script>

</body>
</html>
